name: Update WakaTime language stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@370590ad8da8f54282ed92aa42b7c25ecbd5a9a6
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SECTION_NAME: waka
          SHOW_TITLE: false
          TIME_RANGE: all_time
          LANG_COUNT: 8
          SHOW_TIME: true
          SHOW_TOTAL: false
          STOP_AT_OTHER: true
          CODE_LANG: txt
          TARGET_BRANCH: main
          TARGET_PATH: README.md
          COMMIT_MESSAGE: "Update WakaTime language stats"
